databaseChangeLog:
  - changeSet:
      id: 20262604-create-task-tags-table
      author: adveldyaeva
      changes:
        - createTable:
            tableName: task_tags
            columns:
              - column:
                  name: task_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: tag_id
                  type: UUID
                  constraints:
                    nullable: false

        - addPrimaryKey:
            tableName: task_tags
            columnNames: task_id, tag_id
            constraintName: pk_task_tags

        - addForeignKeyConstraint:
            baseTableName: task_tags
            baseColumnNames: task_id
            referencedTableName: tasks
            referencedColumnNames: id
            constraintName: fk_task_tags_task
            onDelete: CASCADE

        - addForeignKeyConstraint:
            baseTableName: task_tags
            baseColumnNames: tag_id
            referencedTableName: tag
            referencedColumnNames: id
            constraintName: fk_task_tags_tag
            onDelete: CASCADE