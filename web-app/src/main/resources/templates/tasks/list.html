<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/head :: head('Задачи')}"></head>
<body>
<div class="app">
    <th:block th:replace="~{layout/sidebar :: sidebar}"></th:block>
    <main class="main">

        <input type="hidden" id="accountId" th:value="${session?.accountId}"/>

        <div th:if="${success}" class="flash flash--ok  auto-hide" th:text="${success}"></div>
        <div th:if="${error}"   class="flash flash--err auto-hide" th:text="${error}"></div>

        <div class="ph">
            <h2 class="pt">Задачи</h2>
            <div class="ph-actions">
                <button id="aiBtn" class="btn btn--g" onclick="runAi()">✨ AI</button>
                <button class="btn btn--p" onclick="openModal('mCreate')">+ Новая</button>
            </div>
        </div>

        <div id="aiPanel" class="ai-panel" style="display:none">
            <div class="ai-panel__hd">
                <b>✨ Рекомендации AI</b>
                <button onclick="document.getElementById('aiPanel').style.display='none'">✕</button>
            </div>
            <div id="aiBody" class="ai-body"></div>
        </div>

        <!-- aильтры -->
        <form th:action="@{/tasks}" method="get" class="filters">
            <div class="fg-row">
                <select name="status" class="fi" onchange="this.form.submit()">
                    <option value="" th:selected="${filterStatus==null}">Все статусы</option>
                    <option th:each="x:${statuses}" th:value="${x}" th:text="${x}"
                            th:selected="${filterStatus==x}"></option>
                </select>
                <select name="priority" class="fi" onchange="this.form.submit()">
                    <option value="" th:selected="${filterPriority==null}">Все приоритеты</option>
                    <option th:each="x:${priorities}" th:value="${x}" th:text="${x}"
                            th:selected="${filterPriority==x}"></option>
                </select>

                <select name="tagName" class="fi" onchange="this.form.submit()">
                    <option value="" th:selected="${filterTagName == null}">Все теги</option>
                    <option th:each="tg : ${tags}"
                            th:value="${tg.name}"
                            th:text="${tg.name}"
                            th:selected="${filterTagName == tg.name}">
                    </option>
                </select>
                <a th:href="@{/tasks}" class="btn btn--g btn--sm">Сброс</a>

            </div>

        </form>

        <div class="task-grid" id="taskGrid">

            <div th:if="${tasks.empty}" class="empty">
                <div>◎</div><p>Задач пока нет. Создай первую!</p>
            </div>

            <div th:each="t : ${tasks}"
                 th:id="'task-' + ${t.id}"
                 class="card"
                 th:classappend="${t.status == 'COMPLETED'} ? ' card--done' : ''">

                <div class="card__top">
                    <span class="badge-p" th:classappend="'badge-p--'+${t.priority?.toString()?.toLowerCase()}"
                          th:text="${t.priority}"></span>
                    <span class="badge-s" th:classappend="'badge-s--'+${t.status?.toString()?.toLowerCase()}"
                          th:text="${t.status}"></span>
                </div>

                <h3 class="card__title" th:text="${t.title}">Задача</h3>
                <p  class="card__desc"  th:if="${t.description}" th:text="${t.description}"></p>

                <div class="card__due" th:if="${t.dueDate}">
                    ⏰ <span th:text="${t.dueDate.toString().substring(0,10)}"></span>
                </div>

                <div class="card__tags" th:if="${t.tags != null and !t.tags.empty}">
                    <span th:each="tg : ${t.tags}" class="tg"
                          th:style="'background:' + ${tg.color ?: '#e5e7eb'}"
                          th:text="${tg.name}"></span>
                </div>

                <div class="card__foot">
                    <button th:if="${t.status=='CREATED'}"
                            class="btn btn--sm btn--g"
                            th:attr="data-id=${t.id}" onclick="startTask(this)">▶</button>

                    <button th:if="${t.status!='COMPLETED'}"
                            class="btn btn--sm btn--g"
                            th:attr="data-id=${t.id}" onclick="completeTask(this)">✓</button>

                    <button th:if="${t.status!='COMPLETED'}"
                            class="btn btn--sm btn--g"
                            th:attr="data-id=${t.id},data-title=${t.title}"
                            onclick="openReminderModal(this)">⏰</button>

                    <button class="btn btn--sm btn--g"
                            th:attr="data-id=${t.id},
data-title=${t.title},
data-desc=${t.description},
data-status=${t.status},
data-priority=${t.priority},
data-due=${t.dueDate},
data-tagids=${t.tags != null ? #strings.listJoin(t.tags.![id], ',') : ''}"
                            onclick="openEditModal(this)">✎</button>

                    <form th:action="@{'/tasks/'+${t.id}+'/delete'}" method="post" style="display:inline">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <button type="submit" class="btn btn--sm btn--d"
                                onclick="return confirm('Удалить?')">✕</button>
                    </form>
                </div>
            </div>
        </div>

    </main>
</div>

<div id="mCreate" class="modal"><div class="modal__ov" onclick="closeModal('mCreate')"></div>
    <div class="modal__box">
        <div class="modal__hd"><h3>Новая задача</h3><button onclick="closeModal('mCreate')">✕</button></div>
        <form th:action="@{/tasks/create}"
              method="post"
              th:object="${taskForm}"
              novalidate
              onsubmit="collectTagIds('createTagChecks','createTagIds')">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

            <div class="fg">
                <label>Название *</label>
                <input type="text" th:field="*{title}" class="fi" placeholder="Что нужно сделать?" required/>
            </div>
            <div class="fg">
                <label>Описание</label>
                <textarea th:field="*{description}" class="fi" rows="2" placeholder="Детали"></textarea>
            </div>
            <div class="fg-row">
                <div class="fg">
                    <label>Приоритет</label>
                    <select th:field="*{priority}" class="fi">
                        <option th:each="p:${priorities}" th:value="${p}" th:text="${p}"></option>
                    </select>
                </div>
                <div class="fg">
                    <label>Дедлайн</label>
                    <input type="datetime-local" th:field="*{dueDate}" class="fi"/>
                </div>
            </div>

            <div class="fg" th:if="${!tags.empty}">
                <label>Теги</label>
                <div class="tag-checks" id="createTagChecks">
                    <label th:each="tg:${tags}" class="tag-check-label">
                        <input type="checkbox" name="tagCheckCreate"
                               th:value="${tg.id}" th:attr="data-name=${tg.name},data-color=${tg.color}"/>
                        <span class="tg" th:style="'background:'+${tg.color?:'#e5e7eb'}"
                              th:text="${tg.name}"></span>
                    </label>
                </div>
                <input type="hidden" th:field="*{tagIds}" id="createTagIds"/>
            </div>

            <div class="modal__ft">
                <button type="button" class="btn btn--g" onclick="closeModal('mCreate')">Отмена</button>
                <button type="submit" class="btn btn--p">Создать</button>
            </div>
        </form>
    </div></div>

<div id="mEdit" class="modal"><div class="modal__ov" onclick="closeModal('mEdit')"></div>
    <div class="modal__box">
        <div class="modal__hd"><h3>Редактировать</h3><button onclick="closeModal('mEdit')">✕</button></div>
        <form id="editForm" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

            <div class="fg"><label>Название *</label>
                <input type="text" name="title" id="eTitle" class="fi" required/></div>
            <div class="fg"><label>Описание</label>
                <textarea name="description" id="eDesc" class="fi" rows="2"></textarea></div>
            <div class="fg-row">
                <div class="fg"><label>Приоритет</label>
                    <select name="priority" id="ePriority" class="fi">
                        <option th:each="p:${priorities}" th:value="${p}" th:text="${p}"></option>
                    </select></div>
                <div class="fg"><label>Статус</label>
                    <select name="status" id="eStatus" class="fi">
                        <option th:each="x:${statuses}" th:value="${x}" th:text="${x}"></option>
                    </select></div>
            </div>
            <div class="fg"><label>Дедлайн</label>
                <input type="datetime-local" name="dueDate" id="eDue" class="fi"/></div>

            <div class="fg" th:if="${!tags.empty}">
                <label>Теги</label>
                <div class="tag-checks" id="editTagChecks">
                    <label th:each="tg:${tags}" class="tag-check-label">
                        <input type="checkbox" name="tagCheckEdit"
                               th:value="${tg.id}" th:attr="data-name=${tg.name},data-color=${tg.color}"/>
                        <span class="tg" th:style="'background:'+${tg.color?:'#e5e7eb'}"
                              th:text="${tg.name}"></span>
                    </label>
                </div>
                <input type="hidden" name="tagIds" id="editTagIds"/>
            </div>

            <div class="modal__ft">
                <button type="button" class="btn btn--g" onclick="closeModal('mEdit')">Отмена</button>
                <button type="submit" class="btn btn--p"
                        onclick="fixDatetimeFields(this.closest('form')); collectTagIds('editTagChecks','editTagIds')">
                    Сохранить
                </button>
            </div>
        </form>
    </div></div>

<div id="mReminder" class="modal"><div class="modal__ov" onclick="closeModal('mReminder')"></div>
    <div class="modal__box modal__box--sm">
        <div class="modal__hd"><h3>Напоминание</h3><button onclick="closeModal('mReminder')">✕</button></div>
        <p id="rTitle" class="muted" style="margin-bottom:12px"></p>
        <div class="fg"><label>Когда напомнить?</label>
            <input type="datetime-local" id="rDate" class="fi"/></div>
        <div class="modal__ft">
            <button class="btn btn--g" onclick="closeModal('mReminder')">Отмена</button>
            <button class="btn btn--p" onclick="submitReminder()">Сохранить</button>
        </div>
    </div></div>

<script th:src="@{/js/app.js}"></script>
</body>
</html>
