<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/head :: head('Вход')}"></head>
<body class="auth-page">
<div class="auth-wrap">
<div class="auth-card">

    <div class="auth-logo">
        <span class="logo-mark lg">◆</span>
        <h1>FlowMind</h1>
        <p class="muted">Личный планировщик</p>
    </div>

    <div th:if="${success}" class="flash flash--ok"  th:text="${success}"></div>
    <div th:if="${error}"   class="flash flash--err" th:text="${error}"></div>

    <form th:action="@{/login}" method="post" th:object="${loginForm}" novalidate>
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

        <div class="fg">
            <label>Имя пользователя</label>
            <input type="text" th:field="*{username}" class="fi" placeholder="username"
                   th:classappend="${#fields.hasErrors('username')}?' fi--err':''"/>
            <span class="fe" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></span>
        </div>

        <div class="fg">
            <label>Пароль</label>
            <input type="password" th:field="*{password}" class="fi" placeholder="••••••"
                   th:classappend="${#fields.hasErrors('password')}?' fi--err':''"/>
            <span class="fe" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></span>
        </div>

        <button type="submit" class="btn btn--p btn--full">Войти</button>
    </form>

    <p class="auth-switch">Нет аккаунта? <a th:href="@{/register}">Зарегистрироваться</a></p>
</div>
</div>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
