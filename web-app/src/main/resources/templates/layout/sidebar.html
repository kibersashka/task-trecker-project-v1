<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>_</title>
</head>
<body>

<aside th:fragment="sidebar" class="sidebar">

    <div class="sidebar__logo">
        <span class="logo-mark">◆</span>
        <span class="logo-text">FlowMind</span>
    </div>

    <nav class="sidebar__nav">
        <a th:href="@{/tasks}"
           class="nav-link"
           th:classappend="${#strings.startsWith(currentUri,'/tasks') ? ' active' : ''}">
            <span class="ni">☐</span> Задачи
        </a>

        <a th:href="@{/week}"
           class="nav-link"
           th:classappend="${#strings.startsWith(currentUri,'/week') ? ' active' : ''}">
            <span class="ni">▦</span> Неделя
        </a>

        <a th:href="@{/tags}"
           class="nav-link"
           th:classappend="${#strings.startsWith(currentUri,'/tags') ? ' active' : ''}">
            <span class="ni">◈</span> Теги
        </a>

        <a th:href="@{/profile}"
           class="nav-link"
           th:classappend="${#strings.startsWith(currentUri,'/profile') ? ' active' : ''}">
            <span class="ni">◯</span> Профиль
        </a>

        <a th:href="@{/top}"
           class="nav-link"
           th:if="${isAdmin}"
           th:classappend="${#strings.startsWith(currentUri,'/top') ? ' active' : ''}">
            <span class="ni">⚡</span> Топ
        </a>
    </nav>

    <div class="sidebar__footer">

        <button class="notif-bell"
                onclick="toggleNotifDrawer()"
                title="Уведомления">
            🔔
            <span id="notifBadge"
                  class="notif-badge"
                  style="display:none">
                0
            </span>
        </button>

        <span class="sidebar__user"
              th:text="${session?.username}">
            user
        </span>

        <form th:action="@{/logout}" method="post">
            <input type="hidden"
                   th:name="${_csrf.parameterName}"
                   th:value="${_csrf.token}"/>

            <button type="submit" class="btn-logout">
                Выйти
            </button>
        </form>
    </div>

    <!-- DRAWER ВНУТРИ SIDEBAR -->
    <div id="notifDrawer"
         class="notif-drawer"
         style="display:none">

        <div class="notif-drawer__hd">
            <span>Уведомления</span>

            <button type="button"
                    onclick="toggleNotifDrawer()">
                ✕
            </button>
        </div>

        <div id="notifList" class="notif-list">
            <p class="muted"
               style="padding:16px;font-size:13px">
                Загрузка...
            </p>
        </div>
    </div>

</aside>

</body>
</html>
