<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/head :: head('Профиль')}"></head>
<body>
<div class="app">
    <th:block th:replace="~{layout/sidebar :: sidebar}"></th:block>

    <main class="main">

        <div th:if="${success}" class="flash flash--ok auto-hide" th:text="${success}"></div>
        <div th:if="${error}" class="flash flash--err auto-hide" th:text="${error}"></div>

        <div class="ph">
            <h2 class="pt">Профиль</h2>
        </div>

        <div class="profile-grid">

            <div class="pcard">
                <div class="pcard__hd">Аккаунт</div>

                <div class="avatar"
                     th:text="${#strings.substring(session?.username?:'U',0,1)?.toUpperCase()}">
                    U
                </div>


                <div class="prow">
                    <span class="pl">Email</span>
                    <span th:text="${info != null ? info['email'] : '—'}"></span>
                </div>

                <form th:action="@{/profile/update}" method="post" style="margin-top:16px">
                    <input type="hidden"
                           th:name="${_csrf.parameterName}"
                           th:value="${_csrf.token}"/>

                    <div class="fg">
                        <label>Новый email</label>

                        <input type="email"
                               name="email"
                               class="fi"
                               th:value="${info != null ? info['email'] : ''}"
                               placeholder="you@example.com"/>
                    </div>

                    <button type="submit" class="btn btn--p">
                        Обновить
                    </button>
                </form>
            </div>

            <div class="pcard">
                <div class="pcard__hd">Прогресс</div>

                <div class="xp-num" th:text="${xp}+' XP'">
                    0 XP
                </div>

                <div class="xp-bar">
                    <div class="xp-fill"
                         th:style="'width:'+${xpProgress}+'%'">
                    </div>
                </div>

                <p class="muted" style="font-size:12px;margin-top:8px">
                    Завершай задачи:<br/>
                    LOW +10 · MIDDLE +15 · HIGH +25 XP
                </p>
            </div>

        </div>
    </main>
</div>

<script th:src="@{/js/app.js}"></script>
</body>
</html>
