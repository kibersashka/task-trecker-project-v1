<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/head :: head('Топ пользователей')}"></head>
<body>
<div class="app">
    <th:block th:replace="~{layout/sidebar :: sidebar}"></th:block>
    <main class="main">

        <div class="ph">
            <h2 class="pt">Топ пользователей</h2>
            <span class="muted" style="font-size:13px">Пользователи с XP выше среднего</span>
        </div>

        <div th:if="${topUsers.empty}" class="empty">
            <div>◎</div><p>Пока никто не набрал достаточно XP.</p>
        </div>

        <div class="top-list" th:if="${!topUsers.empty}">
            <div th:each="u, i : ${topUsers}" class="top-row">

                <div class="top-row__rank"
                     th:with="rc=(${i.index == 0} ? ' rank-gold' : (${i.index == 1} ? ' rank-silver' : (${i.index == 2} ? ' rank-bronze' : '')))"
                     th:classappend="${rc}">
                    <span th:text="${i.index + 1}"></span>
                </div>

                <div class="top-row__avatar">
                    <span th:text="${u.username != null ? u.username.substring(0,1).toUpperCase() : '?'}">U</span>
                </div>

                <div class="top-row__info">
                    <span class="top-row__email"
                          th:text="${u.username != null ? u.username : 'Аноним'}"></span>

                </div>

                <div class="top-row__xp">
                    <span class="xp-num-sm" th:text="${u.xp} + ' XP'">0 XP</span>
                    <div class="xp-bar xp-bar--sm">
                        <div class="xp-fill"
                             th:attr="data-xp=${u.xp}"
                             style="width:0%"></div>
                    </div>
                </div>

                <div class="top-row__status">
                    <span class="badge-s"
                        th:classappend="${'badge-s--' + #strings.toLowerCase(u.accountStatus.toString())}"
                        th:text="${u.accountStatus}"></span>
                </div>
            </div>
        </div>

    </main>
</div>

<script th:src="@{/js/app.js}"></script>
<script>
    document.addEventListener('DOMContentLoaded', () => {
        const fills = document.querySelectorAll('.xp-fill[data-xp]');
        const max   = Math.max(...[...fills].map(f => parseInt(f.dataset.xp) || 0), 1);
        fills.forEach(f => f.style.width = (parseInt(f.dataset.xp) / max * 100) + '%');
    });
</script>
</body>
</html>
